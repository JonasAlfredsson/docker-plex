name: "check-for-updates"

on:
  workflow_dispatch:
  schedule:
    - cron: '22 11 * * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: check-plex-update
  cancel-in-progress: true

jobs:
  check_version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run the script that checks for new Plex versions
        run: bash .github/check_plex_update.sh ./Dockerfile

      - name: Extract version numbers from the Dockerfile
        run: bash .github/version_extractor.sh ./Dockerfile >> $GITHUB_ENV

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Update Plex base image to ${{ env.APP_VERSION }}
          branch: chore/update-plex
          delete-branch: true
          title: Update Plex base image to ${{ env.APP_VERSION }}
          body: |
            Auto-generated by custom Plex update checker.